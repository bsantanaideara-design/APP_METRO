<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso · Metro de Madrid</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo: #DA291C;
    --azul: #003DA5;
    --gris-oscuro: #1a1a2e;
    --blanco: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gris-oscuro);
    color: var(--blanco);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #22223a;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    border-top: 4px solid var(--rojo);
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 2rem;
  }

  .logo-area img {
    height: 64px;
    width: auto;
  }

  .logo-area h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--rojo);
    letter-spacing: 2px;
  }

  .logo-area p {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.4rem;
  }

  input[type=text], input[type=password] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.2rem;
  }

  input[type=text]:focus, input[type=password]:focus {
    border-color: var(--rojo);
    box-shadow: 0 0 0 3px rgba(218,41,28,0.15);
  }

  .btn {
    width: 100%;
    background: var(--rojo);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.4rem;
  }

  .btn:hover { background: #b81e13; }

  .error {
    background: rgba(218,41,28,0.15);
    border: 1px solid rgba(218,41,28,0.4);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.85rem;
    color: #ff7b71;
    margin-bottom: 1.2rem;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <img src="{{ url_for('static', filename='logo.webp') }}" alt="Metro de Madrid">
    <h1>Metro de Madrid</h1>
    <p>Visor de Cuestionarios</p>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="usuario">Usuario</label>
    <input type="text" id="usuario" name="usuario" placeholder="Tu usuario" autocomplete="username" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

    <button type="submit" class="btn">Entrar</button>
  </form>
</div>

</body>
</html>
